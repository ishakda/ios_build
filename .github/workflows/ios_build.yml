name: iOS Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Removed fixed version to use the latest stable that matches your Dart 3.11.5 requirement

      - name: Install Dependencies
        run: |
          flutter pub get
          cd ios
          pod install
          cd ..

      - name: Build IPA
        run: flutter build ipa --no-codesign
        # Note: --no-codesign builds the app but it won't run on a physical device 
        # until you add your Apple Certificates to GitHub Secrets.

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/ipa/*.ipa
